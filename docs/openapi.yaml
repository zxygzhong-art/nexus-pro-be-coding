  /v1/agents/chat:
    post:
      summary: Stream agent chat
      description: Streams a single assistant chat turn as server-sent events. Disabled deployments return 503 with reason_code `agent_chat_disabled`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              anyOf:
                - required: [message]
                - required: [attachment_ids]
              properties:
                agent_id: {type: string, description: Optional published workspace Agent definition to bind this turn}
                session_id: {type: string}
                message: {type: string}
                attachment_ids:
                  type: array
                  maxItems: 8
                  uniqueItems: true
                  items: {type: string}
                  description: Current-context session file IDs to bind to the persisted user message.
                mode:
                  type: string
                  enum: [assistant_chat, assistant_recommendation]
                  default: assistant_chat
                  description: Use assistant_recommendation to recommend only assistants visible to the current account.
      responses:
        "200":
          description: SSE stream with session, message_delta, tool_call, tool_result, analysis_result, confirmation_required, done, and error events.
          content:
            text/event-stream:
              schema:
                type: string
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "503":
          description: Agent chat is disabled or not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
