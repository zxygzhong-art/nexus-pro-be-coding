    AttendanceClockRecord:
      type: object
      description: Persisted tenant resource. id is globally unique across tenants; tenant_id scopes ownership and authorization.
      required: [id, tenant_id, employee_id, work_date, direction, clocked_at, latitude, longitude, record_status, source, created_at]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        employee_id: {type: string}
        shift_assignment_id: {type: string, nullable: true}
        shift_id: {type: string, nullable: true}
        worksite_id: {type: string, nullable: true}
        worksite_name:
          type: string
          description: Current display name of the associated worksite; not a historical snapshot.
        worksite_address:
          type: string
          description: Current display address of the associated worksite; not a historical snapshot.
        work_date: {type: string, format: date}
        direction: {type: string, enum: [clock_in, clock_out]}
        client_event_id: {type: string, description: Client-generated idempotency key scoped to the tenant.}
        clocked_at: {type: string, format: date-time}
        latitude:
          type: number
          format: double
          description: Sensitive GPS evidence; response value may be redacted to 0 by attendance clock field policy.
        longitude:
          type: number
          format: double
          description: Sensitive GPS evidence; response value may be redacted to 0 by attendance clock field policy.
        accuracy_meters:
          type: number
          format: double
          description: Sensitive GPS evidence; response value may be redacted to 0 by attendance clock field policy.
        distance_meters:
          type: number
          format: double
          description: Sensitive GPS evidence; response value may be redacted to 0 by attendance clock field policy.
        record_status:
          type: string
          enum: [accepted, abnormal, rejected]
          description: Static evidence validity. Time-window and insufficient-hours anomalies are derived from the daily projection; accepted raw punches remain eligible until voided.
        rejection_reason: {type: string, enum: [duplicate, invalid_sequence, low_location_accuracy, outside_geofence, outside_time_window, insufficient_work_hours]}
        source: {type: string, enum: [geofence, manual_correction]}
        device_id:
          type: string
          description: Sensitive device evidence; response value may be hidden by attendance clock field policy.
        device_info:
          type: object
          additionalProperties: true
          description: Sensitive device evidence; response value may be hidden by attendance clock field policy.
        correction_request_id: {type: string}
        voided: {type: boolean, description: Preserves the raw punch but excludes it from daily projection.}
        voided_at: {type: string, format: date-time}
        voided_by_account_id: {type: string}
        void_reason: {type: string}
        created_at: {type: string, format: date-time}
    CreateAttendanceClockRecordRequest:
      type: object
      required: [direction, latitude, longitude]
      properties:
        employee_id:
          type: string
          description: Optional compatibility field; when provided it must match the current account's employee_id.
        direction: {type: string, enum: [clock_in, clock_out]}
        client_event_id: {type: string, description: Recommended idempotency key generated once per user punch action.}
        latitude: {type: number, format: double}
        longitude: {type: number, format: double}
        accuracy_meters:
          type: number
          format: double
          minimum: 0
          description: Values above the server accuracy threshold are recorded as rejected low_location_accuracy attempts.
        location_source: {type: string}
        device_id: {type: string}
        device_info:
          type: object
          additionalProperties: true
