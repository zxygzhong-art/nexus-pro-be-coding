        health_insurance_date: {type: string}
        health_insurance_level: {type: string}
        health_insurance_amount: {type: number}
    EmployeeInput:
      type: object
      required: [name, company_email, org_unit_id, position, category, hire_date, basic_info, employment_info, education_military_info, contact_info, insurance_info]
      properties:
        employee_no:
          type: string
          description: Optional. Generated by the backend with IKL prefix when omitted.
        name: {type: string}
        company_email: {type: string, format: email}
        personal_email: {type: string, format: email}
        phone: {type: string}
        org_unit_id: {type: string}
        account_id: {type: string}
        account_policy:
          type: string
          enum: [none, link_existing, create_pending_invite, create_active]
          description: Optional account lifecycle policy. Defaults to link_existing when account_id is provided, otherwise none.
        position_id:
          type: string
          description: Optional position entity id. When supplied, employee.position is synchronized from the position name.
        position: {type: string}
        category:
          $ref: "#/components/schemas/EmployeeCategory"
        status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        employment_status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        hire_date: {type: string}
        resign_date: {type: string}
        basic_info: {$ref: "#/components/schemas/EmployeeBasicInfo"}
        employment_info: {$ref: "#/components/schemas/EmployeeEmploymentInfo"}
        education_military_info: {$ref: "#/components/schemas/EmployeeEducationMilitaryInfo"}
        contact_info: {$ref: "#/components/schemas/EmployeeContactInfo"}
        insurance_info: {$ref: "#/components/schemas/EmployeeInsuranceInfo"}
        internal_experiences:
          type: array
          items: {$ref: "#/components/schemas/EmployeeExperience"}
    EmployeePatch:
      type: object
      description: Employee edit only accepts basic information. Omitted fields are preserved and basic_info is merged key-by-key.
      properties:
        employee_no: {type: string}
        name: {type: string}
        company_email: {type: string, format: email}
        basic_info: {$ref: "#/components/schemas/EmployeeBasicInfo"}
    EmployeeQuery:
      type: object
      properties:
        keyword: {type: string}
        department_id: {type: string}
        employment_status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        category:
          $ref: "#/components/schemas/EmployeeCategory"
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        sort: {type: string, enum: [created_at_asc, created_at_desc, hire_date_asc, hire_date_desc]}
