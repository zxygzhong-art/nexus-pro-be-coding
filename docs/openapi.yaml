        "200":
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token issued by the configured identity provider and mapped to a local tenant account.
  parameters:
    ID:
      name: id
      in: path
      required: true
      description: Globally unique persisted resource identifier; tenant_id still scopes ownership and authorization.
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Sort:
      name: sort
      in: query
      schema:
        type: string
    ApprovalConfirmed:
      name: X-Approval-Confirmed
      in: header
      schema:
        type: boolean
      description: Required for high-risk actions when no approved workflow instance is supplied.
    ApprovalInstanceID:
      name: X-Approval-Instance-ID
      in: header
      schema:
        type: string
      description: Approved workflow instance bound to the high-risk action target or filters.
    EmployeeID:
      name: id
      in: path
      required: true
      description: Globally unique employee identifier; tenant_id still scopes ownership and authorization.
      schema:
        type: string
  responses:
    ValidationError:
      description: Validation failed. Field errors include tab, field, code and message; import row errors include row_number.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthenticated:
      description: Authenticated tenant/account context is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Permission, menu, button, field, data-scope, or high-risk approval was denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource was not found in the current tenant.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error. Response includes trace_id.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    DataResponse:
      type: object
      required: [data]
      properties:
        data:
          description: Successful response payload.
    IAMRoleProjectionListDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/IAMRoleProjectionPage"
    IAMRoleBindingProjectionListDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/IAMRoleBindingProjectionPage"
    IAMRoleProjectionPage:
      type: object
      required: [items, total, page, page_size, sort]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IAMRoleProjection"
        total: {type: integer}
        page: {type: integer}
        page_size: {type: integer}
        sort: {type: string}
    IAMRoleBindingProjectionPage:
      type: object
      required: [items, total, page, page_size, sort]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IAMRoleBindingProjection"
        total: {type: integer}
        page: {type: integer}
        page_size: {type: integer}
        sort: {type: string}
    IAMRoleProjection:
      type: object
      required: [id, tenant_id, name, permission_set_ids, permission_sets, trusted, created_at]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        name: {type: string}
        description: {type: string}
        permission_set_ids:
          type: array
          items: {type: string}
        permission_sets:
          type: array
          items:
            $ref: "#/components/schemas/IAMPermissionSet"
        trusted: {type: boolean}
        trust_policy:
          type: object
          additionalProperties: true
        permission_boundary:
          type: object
          additionalProperties: true
        session_duration_seconds: {type: integer}
        created_at: {type: string, format: date-time}
    IAMRoleBindingProjection:
      type: object
      required: [id, tenant_id, principal_type, principal_id, permission_set_id, effect, created_at]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        principal_type: {type: string, enum: [account, user_group, assumable_role, service, agent]}
        principal_id: {type: string}
        permission_set_id: {type: string}
        permission_set:
          $ref: "#/components/schemas/IAMPermissionSet"
        effect: {type: string, enum: [allow, deny]}
        data_scope_id: {type: string}
        condition_id: {type: string}
        starts_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
        created_at: {type: string, format: date-time}
    IAMPermissionSet:
      type: object
      required: [id, tenant_id, name, permissions, created_at]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        name: {type: string}
        description: {type: string}
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/IAMPermission"
        created_at: {type: string, format: date-time}
    IAMPermission:
      type: object
      required: [resource, action]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        application_code: {type: string}
        resource_type: {type: string}
        permission_type: {type: string, enum: [menu, api, button, field, scope]}
        resource: {type: string}
        action: {type: string}
        target: {type: string}
        scope: {type: string}
        effect: {type: string}
        risk_level: {type: string}
        severity: {type: string}
        relation: {type: string}
        menu_key: {type: string}
        name: {type: string}
        description: {type: string}
        high_risk: {type: boolean}
    SSOLoginVerificationDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/SSOLoginVerification"
    SSOLoginVerification:
      type: object
      required: [provider, tenant_id, account_id, email]
      properties:
        provider: {type: string, example: keycloak}
        tenant_id: {type: string}
        account_id: {type: string}
        email: {type: string, format: email}
    WorkflowFormStateDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/WorkflowFormStateResponse"
    WorkflowFormStateResponse:
      type: object
      required: [form_instance_id, can_act, steps]
      properties:
        form_instance_id: {type: string}
        run_id: {type: string}
        run_status:
          type: string
          enum: [running, returned, completed, cancelled]
        current_stage_id: {type: string}
        current_stage_label: {type: string}
        can_act: {type: boolean}
        allowed_actions:
          type: array
          items:
            type: string
            enum: [approve, reject, return]
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowFormStep"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowReviewLogItem"
    WorkflowFormStep:
      type: object
      required: [stage_id, label, state]
      properties:
        stage_id: {type: string}
        label: {type: string}
        detail: {type: string}
        state:
          type: string
          enum: [pending, active, completed, skipped, rejected]
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowFormStepAssignee"
    WorkflowFormStepAssignee:
      type: object
      required: [account_id, name, status]
      properties:
        account_id: {type: string}
        name: {type: string}
        status:
          type: string
          enum: [pending, approved, rejected, returned]
    WorkflowReviewLogItem:
      type: object
      required: [type, name, time]
      properties:
        type: {type: string}
        name: {type: string}
        role: {type: string}
        time: {type: string}
        comment: {type: string}
    PlatformHomeDataResponse:
