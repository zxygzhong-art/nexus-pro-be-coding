        id: {type: string}
        tenant_id: {type: string}
        display_name: {type: string}
        email: {type: string, format: email}
        employee_id: {type: string}
        status: {type: string, enum: [active, disabled, pending_invite]}
        user_group_ids:
          type: array
          items: {type: string}
        direct_permission_set_ids:
          type: array
          items: {type: string}
        active_assumable_role_id: {type: string}
        preferred_locale: {type: string, enum: [zh-TW, en-US], default: zh-TW}
        version: {type: integer, format: int64}
        created_at: {type: string, format: date-time}
    MeDataResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [account]
          additionalProperties: true
          properties:
            account:
              $ref: "#/components/schemas/Account"
    UpdateMeProfileRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        english_name: {type: string, maxLength: 100}
        mobile_phone: {type: string, maxLength: 32}
        extension: {type: string, maxLength: 16}
        slack: {type: string, maxLength: 80}
        emergency_contact_name: {type: string, maxLength: 100}
    UpdateMePreferencesRequest:
      type: object
      additionalProperties: false
      required: [preferred_locale]
      properties:
        preferred_locale: {type: string, enum: [zh-TW, en-US]}
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [current_password, new_password, confirmation]
      properties:
        current_password: {type: string, minLength: 1, maxLength: 512, format: password}
        new_password: {type: string, minLength: 1, maxLength: 512, format: password}
        confirmation: {type: string, minLength: 1, maxLength: 512, format: password}
    EmployeeInsuranceInfoSection:
      type: object
      additionalProperties: true
      properties:
        labor_insurance_date: {type: string}
        labor_insurance_level: {type: string}
