openapi: 3.0.3
info:
  title: Nexus Pro Backend API
  version: 0.2.0
paths:
  /v1/hr/employees:
    get:
      summary: List employees
      parameters:
        - {name: keyword, in: query, schema: {type: string}}
        - {name: department_id, in: query, schema: {type: string}}
        - {name: employment_status, in: query, schema: {type: string}}
        - {name: category, in: query, schema: {type: string}}
        - {name: page, in: query, schema: {type: integer, minimum: 1}}
        - {name: page_size, in: query, schema: {type: integer, minimum: 1, maximum: 100}}
        - {name: sort, in: query, schema: {type: string, enum: [created_at_asc, created_at_desc, hire_date_asc, hire_date_desc]}}
      responses:
        "200":
          description: Employee page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    post:
      summary: Create employee aggregate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetailDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/preview:
    post:
      summary: Validate and normalize employee create payload without persistence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "200":
          description: Employee preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeePreviewDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}:
    get:
      summary: Get employee detail grouped by profile sections
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      responses:
        "200":
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetailDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    patch:
      summary: Patch employee aggregate sections
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeePatch"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetailDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    delete:
      summary: Soft delete an employee
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      responses:
        "200":
          description: Soft-deleted employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}/preview:
    post:
      summary: Validate and preview employee patch without persistence
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeePatch"
      responses:
        "200":
          description: Employee update preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeePreviewDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}/avatar:
    post:
      summary: Upload or replace employee avatar
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: {type: string, format: binary}
      responses:
        "200":
          description: Employee with updated avatar metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    delete:
      summary: Remove employee avatar
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      responses:
        "200":
          description: Employee with avatar metadata removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/stats:
    get:
      summary: Employee dashboard counts
      parameters:
        - {name: keyword, in: query, schema: {type: string}}
        - {name: department_id, in: query, schema: {type: string}}
        - {name: employment_status, in: query, schema: {type: string}}
        - {name: category, in: query, schema: {type: string}}
      responses:
        "200":
          description: Employee statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeStatsDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employee-options:
    get:
      summary: Employee form options
      responses:
        "200":
          description: Employee options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeOptionsDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/import/template:
    get:
      summary: Download employee import template
      parameters:
        - {name: format, in: query, schema: {type: string, enum: [csv, xlsx], default: csv}}
      responses:
        "200":
          description: CSV or XLSX template with 10 import columns
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/import/preview:
    post:
      summary: Preview employee CSV or XLSX import
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
          application/json:
            schema:
              type: object
              required: [filename, content]
              properties:
                filename: {type: string}
                content: {type: string}
      responses:
        "201":
          description: Import preview session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeImportSessionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/import/{id}/confirm:
    post:
      summary: Confirm a previewed employee import
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode: {type: string, enum: [create, update, upsert], default: create}
                failure_policy: {type: string, enum: [all_or_nothing], default: all_or_nothing}
      responses:
        "200":
          description: Confirmed import session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeImportSessionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/export:
    get:
      summary: Export employees as CSV
      parameters:
        - $ref: "#/components/parameters/ApprovalConfirmed"
        - $ref: "#/components/parameters/ApprovalInstanceID"
        - {name: keyword, in: query, schema: {type: string}}
        - {name: department_id, in: query, schema: {type: string}}
        - {name: employment_status, in: query, schema: {type: string}}
        - {name: category, in: query, schema: {type: string}}
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    post:
      summary: Export filtered employees as JSON
      parameters:
        - $ref: "#/components/parameters/ApprovalConfirmed"
        - $ref: "#/components/parameters/ApprovalInstanceID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeQuery"
      responses:
        "200":
          description: Exported employee rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeExportDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/batch-delete:
    post:
      summary: Soft delete employees in batch
      parameters:
        - $ref: "#/components/parameters/ApprovalConfirmed"
        - $ref: "#/components/parameters/ApprovalInstanceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_ids, reason]
              properties:
                employee_ids:
                  type: array
                  items: {type: string}
                reason: {type: string}
      responses:
        "200":
          description: Batch delete results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchEmployeeDataResponse"
        "207":
          description: Batch delete results with per-employee failures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchEmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}/invite:
    post:
      summary: Create or resend an account invitation for an employee
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: {type: string, format: email}
      responses:
        "200":
          description: Employee with invitation account link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}/status-transition:
    post:
      summary: Transition employee lifecycle status
      description: Use status=active, probation, or onboarding with reason and start_date to reinstate a resigned employee. Use status=resigned with reason and end_date to offboard. Use status=leave_suspended with reason, start_date, and end_date for leave suspension.
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: {type: string}
                reason: {type: string}
                start_date: {type: string}
                end_date: {type: string}
                details:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}/status:
    patch:
      summary: Update employee status directly
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/EmployeeDirectStatus"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/me:
    get:
      summary: Resolve current account profile
      responses:
        "200":
          description: Current account profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/me/menus:
    get:
      summary: List current account menus
      responses:
        "200":
          description: Current account menus
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/authz/check:
    post:
      summary: Check one authorization request
      responses:
        "200":
          description: Authorization decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/authz/batch-check:
    post:
      summary: Check multiple authorization requests
      responses:
        "200":
          description: Batch authorization decisions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/authz/explain:
    post:
      summary: Explain one authorization decision
      responses:
        "200":
          description: Authorization explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/authz/simulate:
    post:
      summary: Simulate one authorization decision
      responses:
        "200":
          description: Authorization simulation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/permissions:
    get:
      summary: List permissions
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Permission page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/user-groups:
    get:
      summary: List user groups
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: User group page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create user group
      responses:
        "201":
          description: Created user group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/permission-sets:
    get:
      summary: List permission sets
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Permission set page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create permission set
      responses:
        "201":
          description: Created permission set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/permission-set-assignments:
    get:
      summary: List permission set assignments
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Permission set assignment page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create permission set assignment
      responses:
        "201":
          description: Created permission set assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/data-scopes:
    get:
      summary: List data scopes
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Data scope page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create data scope
      responses:
        "201":
          description: Created data scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/field-policies:
    get:
      summary: List field policies
      parameters:
        - {name: application_code, in: query, schema: {type: string}}
        - {name: resource_type, in: query, schema: {type: string}}
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Field policy page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create field policy
      responses:
        "201":
          description: Created field policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/assumable-roles:
    get:
      summary: List assumable roles
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Assumable role page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create assumable role
      responses:
        "201":
          description: Created assumable role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/iam/assumable-roles/{id}/assume:
    post:
      summary: Assume a role
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Active assumed role session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/org/units:
    get:
      summary: List organization units
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Organization unit page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create organization unit
      responses:
        "201":
          description: Created organization unit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/attendance/leave-balances:
    get:
      summary: List leave balances
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Leave balance page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/attendance/leave-requests:
    get:
      summary: List leave requests
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Leave request page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create leave request
      responses:
        "201":
          description: Created leave request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/forms/templates:
    get:
      summary: List form templates
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Form template page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create form template
      responses:
        "201":
          description: Created form template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/workflows/forms/{id}/submit:
    post:
      summary: Submit a workflow form
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "201":
          description: Submitted workflow form instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/workflows/forms/{id}/approve:
    post:
      summary: Approve a workflow form instance for high-risk action confirmation
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Approved workflow form instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/agents/runs:
    get:
      summary: List agent runs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Agent run page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
    post:
      summary: Create agent run
      responses:
        "201":
          description: Created agent run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
  /v1/audit-logs:
    get:
      summary: List audit logs
      parameters:
        - $ref: "#/components/parameters/ApprovalConfirmed"
        - $ref: "#/components/parameters/ApprovalInstanceID"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse"
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Sort:
      name: sort
      in: query
      schema:
        type: string
    ApprovalConfirmed:
      name: X-Approval-Confirmed
      in: header
      schema:
        type: boolean
      description: Required for high-risk actions when no approved workflow instance is supplied.
    ApprovalInstanceID:
      name: X-Approval-Instance-ID
      in: header
      schema:
        type: string
      description: Approved workflow instance bound to the high-risk action target or filters.
    EmployeeID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: Validation failed. Field errors include tab, field, code and message; import row errors include row_number.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthenticated:
      description: Authenticated tenant/account context is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Permission, menu, button, field, data-scope, or high-risk approval was denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource was not found in the current tenant.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error. Response includes trace_id.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    DataResponse:
      type: object
      required: [data]
      properties:
        data:
          description: Successful response payload.
    EmployeeDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Employee"
    EmployeeDetailDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/EmployeeDetail"
    EmployeeListDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/EmployeeListResponse"
    EmployeePreviewDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/EmployeePreviewResponse"
    EmployeeStatsDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/EmployeeStats"
    EmployeeOptionsDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/EmployeeOptions"
    EmployeeImportSessionDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/EmployeeImportSession"
    EmployeeExportDataResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Employee"
    BatchEmployeeDataResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/BatchEmployeeResponse"
    Employee:
      allOf:
        - $ref: "#/components/schemas/EmployeeInput"
        - type: object
          required: [id, tenant_id, name, status, created_at, updated_at]
          properties:
            id: {type: string}
            tenant_id: {type: string}
            created_at: {type: string, format: date-time}
            updated_at: {type: string, format: date-time}
    EmployeeDetail:
      description: Backward-compatible employee detail with explicit modal sections.
      allOf:
        - $ref: "#/components/schemas/Employee"
        - type: object
          required: [preview, sections]
          properties:
            preview:
              $ref: "#/components/schemas/EmployeeDetailPreview"
            sections:
              $ref: "#/components/schemas/EmployeeSections"
    EmployeeDetailPreview:
      type: object
      required: [id, name, status, created_at, updated_at]
      properties:
        id: {type: string}
        employee_no: {type: string}
        name: {type: string}
        company_email: {type: string, format: email}
        personal_email: {type: string, format: email}
        phone: {type: string}
        org_unit_id: {type: string}
        account_id: {type: string}
        manager_employee_id: {type: string}
        position: {type: string}
        category:
          $ref: "#/components/schemas/EmployeeCategory"
        status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        employment_status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        hire_date: {type: string, format: date-time}
        resign_date: {type: string, format: date-time}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    EmployeeSections:
      type: object
      required: [basic_info, employment_info, education_military_info, contact_info, insurance_info, internal_experiences]
      properties:
        basic_info: {$ref: "#/components/schemas/EmployeeBasicInfoSection"}
        employment_info: {$ref: "#/components/schemas/EmployeeEmploymentInfoSection"}
        education_military_info: {$ref: "#/components/schemas/EmployeeEducationMilitaryInfoSection"}
        contact_info: {$ref: "#/components/schemas/EmployeeContactInfoSection"}
        insurance_info: {$ref: "#/components/schemas/EmployeeInsuranceInfoSection"}
        internal_experiences:
          type: array
          description: Replaced as a whole when submitted in EmployeePatch.
          items: {$ref: "#/components/schemas/EmployeeExperience"}
    EmployeeBasicInfoSection:
      type: object
      additionalProperties: true
      properties:
        name: {type: string}
        company_email: {type: string, format: email}
        personal_email: {type: string, format: email}
        nationality_type: {type: string, enum: [local, foreign]}
        national_id: {type: string}
        passport_no: {type: string}
        passport_name: {type: string}
        entry_date: {type: string}
        arc_no: {type: string}
        arc_expiry_date: {type: string}
        tax_id: {type: string}
        work_permit_no: {type: string}
        work_permit_expiry_date: {type: string}
        contract_expiry_date: {type: string}
        broker: {type: string}
        avatar:
          type: object
          additionalProperties: true
    EmployeeEmploymentInfoSection:
      type: object
      additionalProperties: true
      properties:
        org_unit_id: {type: string}
        position: {type: string}
        category: {$ref: "#/components/schemas/EmployeeCategory"}
        manager_employee_id: {type: string}
        employment_status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        hire_date: {type: string}
        resign_date: {type: string}
        resign_reason: {type: string}
        shift: {type: string}
        tenure_start_date: {type: string}
    EmployeeEducationMilitaryInfoSection:
      type: object
      additionalProperties: true
      properties:
        highest_education: {type: string}
        education_level: {type: string}
        degree: {type: string}
        school: {type: string}
        school_name: {type: string}
        graduation_date: {type: string}
        military_status: {type: string}
        military_service_status: {type: string}
    EmployeeContactInfoSection:
      type: object
      additionalProperties: true
      properties:
        mobile_phone: {type: string}
        phone: {type: string}
        address: {type: string}
        communication_address: {type: string}
        emergency_contact_relation: {type: string}
        emergency_contact_name: {type: string}
        emergency_contact_phone: {type: string}
    EmployeeInsuranceInfoSection:
      type: object
      additionalProperties: true
      properties:
        labor_insurance_date: {type: string}
        labor_insurance_level: {type: string}
        labor_insurance_salary: {type: number}
        health_insurance_date: {type: string}
        health_insurance_level: {type: string}
        health_insurance_amount: {type: number}
    EmployeeInput:
      type: object
      required: [name, company_email, org_unit_id, position, category, hire_date, basic_info, employment_info, education_military_info, contact_info, insurance_info]
      properties:
        employee_no:
          type: string
          description: Optional. Generated by the backend with IKL prefix when omitted.
        name: {type: string}
        company_email: {type: string, format: email}
        personal_email: {type: string, format: email}
        phone: {type: string}
        org_unit_id: {type: string}
        account_id: {type: string}
        account_policy:
          type: string
          enum: [none, link_existing, create_pending_invite, create_active]
          description: Optional account lifecycle policy. Defaults to link_existing when account_id is provided, otherwise none.
        position: {type: string}
        category:
          $ref: "#/components/schemas/EmployeeCategory"
        status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        employment_status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        hire_date: {type: string}
        resign_date: {type: string}
        basic_info: {$ref: "#/components/schemas/EmployeeBasicInfo"}
        employment_info: {$ref: "#/components/schemas/EmployeeEmploymentInfo"}
        education_military_info: {$ref: "#/components/schemas/EmployeeEducationMilitaryInfo"}
        contact_info: {$ref: "#/components/schemas/EmployeeContactInfo"}
        insurance_info: {$ref: "#/components/schemas/EmployeeInsuranceInfo"}
        internal_experiences:
          type: array
          items: {$ref: "#/components/schemas/EmployeeExperience"}
    EmployeePatch:
      type: object
      description: Omitted scalar fields and omitted sections are preserved. Object sections are merged key-by-key. internal_experiences is replaced as a whole when provided.
      properties:
        employee_no: {type: string}
        name: {type: string}
        company_email: {type: string, format: email}
        personal_email: {type: string, format: email}
        phone: {type: string}
        org_unit_id: {type: string}
        account_id: {type: string}
        position: {type: string}
        category:
          $ref: "#/components/schemas/EmployeeCategory"
        hire_date: {type: string}
        resign_date: {type: string}
        basic_info: {$ref: "#/components/schemas/EmployeeBasicInfo"}
        employment_info: {$ref: "#/components/schemas/EmployeeEmploymentInfo"}
        education_military_info: {$ref: "#/components/schemas/EmployeeEducationMilitaryInfo"}
        contact_info: {$ref: "#/components/schemas/EmployeeContactInfo"}
        insurance_info: {$ref: "#/components/schemas/EmployeeInsuranceInfo"}
        internal_experiences:
          type: array
          items: {$ref: "#/components/schemas/EmployeeExperience"}
    EmployeeQuery:
      type: object
      properties:
        keyword: {type: string}
        department_id: {type: string}
        employment_status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        category:
          $ref: "#/components/schemas/EmployeeCategory"
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        sort: {type: string, enum: [created_at_asc, created_at_desc, hire_date_asc, hire_date_desc]}
    EmployeeCategory:
      type: string
      enum: [full_time, part_time, intern, contractor, other]
    EmployeeStatus:
      type: string
      enum: [active, probation, leave_suspended, onboarding, resigned]
    EmployeeDirectStatus:
      type: string
      enum: [active, probation, onboarding]
    EmployeeStatusWithDeleted:
      type: string
      enum: [active, probation, leave_suspended, onboarding, resigned, deleted]
    EmployeeExperience:
      type: object
      properties:
        id: {type: string}
        start_date: {type: string, format: date-time}
        end_date: {type: string, format: date-time}
        reason: {type: string}
        org_unit_id: {type: string}
        position: {type: string}
        category: {type: string}
        status:
          $ref: "#/components/schemas/EmployeeStatusWithDeleted"
        current: {type: boolean}
        created_at: {type: string, format: date-time}
    EmployeePreviewResponse:
      type: object
      required: [employee, detail, valid]
      properties:
        employee: {$ref: "#/components/schemas/Employee"}
        detail: {$ref: "#/components/schemas/EmployeeDetail"}
        valid: {type: boolean}
        field_errors:
          type: array
          items:
            type: object
            properties:
              tab: {type: string}
              field: {type: string}
              code: {type: string}
              message: {type: string}
        diff:
          type: object
          additionalProperties: true
    EmployeeBasicInfo:
      type: object
      required: [nationality_type]
      additionalProperties: true
      properties:
        nationality_type: {type: string, enum: [local, foreign]}
        national_id: {type: string}
        passport_no: {type: string}
        passport_name: {type: string}
        entry_date: {type: string}
        arc_no: {type: string}
        arc_expiry_date: {type: string}
        tax_id: {type: string}
        work_permit_no: {type: string}
        work_permit_expiry_date: {type: string}
        contract_expiry_date: {type: string}
        broker: {type: string}
        avatar:
          type: object
          additionalProperties: true
    EmployeeEmploymentInfo:
      type: object
      required: [org_unit_id, position, category]
      additionalProperties: true
      properties:
        org_unit_id: {type: string}
        position: {type: string}
        category: {$ref: "#/components/schemas/EmployeeCategory"}
        manager_employee_id: {type: string}
        shift: {type: string}
        tenure_start_date: {type: string}
    EmployeeEducationMilitaryInfo:
      type: object
      required: [highest_education, school]
      additionalProperties: true
      properties:
        highest_education: {type: string}
        school: {type: string}
        graduation_date: {type: string}
    EmployeeContactInfo:
      type: object
      required: [mobile_phone, address, emergency_contact_relation, emergency_contact_name, emergency_contact_phone]
      additionalProperties: true
      properties:
        mobile_phone: {type: string}
        address: {type: string}
        emergency_contact_relation: {type: string}
        emergency_contact_name: {type: string}
        emergency_contact_phone: {type: string}
    EmployeeInsuranceInfo:
      type: object
      required: [labor_insurance_date, labor_insurance_level, labor_insurance_salary, health_insurance_date, health_insurance_level, health_insurance_amount]
      additionalProperties: true
      properties:
        labor_insurance_date: {type: string}
        labor_insurance_level: {type: string}
        labor_insurance_salary: {type: number}
        health_insurance_date: {type: string}
        health_insurance_level: {type: string}
        health_insurance_amount: {type: number}
    Section:
      type: object
      additionalProperties: true
    EmployeeListResponse:
      type: object
      required: [items, total, page, page_size, sort]
      properties:
        items:
          type: array
          items: {$ref: "#/components/schemas/Employee"}
        total: {type: integer}
        page: {type: integer}
        page_size: {type: integer}
        sort: {type: string}
    EmployeeStats:
      type: object
      properties:
        total: {type: integer}
        active: {type: integer}
        onboarding: {type: integer}
        probation: {type: integer}
        leave_suspended: {type: integer}
        resigned: {type: integer}
        hired_this_month: {type: integer}
        left_this_month: {type: integer}
    EmployeeOptions:
      type: object
      properties:
        departments:
          type: array
          items: {type: object}
        positions:
          type: array
          items: {type: string}
        employment_statuses:
          type: array
          items: {type: string}
        categories:
          type: array
          items: {type: string}
        job_grades:
          type: array
          items: {type: string}
        job_levels:
          type: array
          items: {type: string}
    EmployeeImportSession:
      type: object
      properties:
        id: {type: string}
        tenant_id: {type: string}
        filename: {type: string}
        object_provider: {type: string}
        object_bucket: {type: string}
        object_key: {type: string}
        content_type: {type: string}
        size_bytes: {type: integer, format: int64}
        sha256: {type: string}
        status: {type: string}
        rows:
          type: array
          items: {type: object}
        summary:
          type: object
          additionalProperties: true
        created_by_account_id: {type: string}
        confirmed_by_account_id: {type: string}
        created_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
        confirmed_at: {type: string, format: date-time}
    BatchEmployeeResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              employee_id: {type: string}
              success: {type: boolean}
              action:
                type: string
                enum: [soft_deleted, soft_deleted_account_disabled]
              code: {type: string}
              message: {type: string}
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              format: int32
              description: |
                Numeric application error code. Current ranges:
                1xxxx common platform, request and authentication errors;
                2xxxx IAM and authorization errors; 3xxxx people-domain and HR errors;
                4xxxx attendance errors; 5xxxx workflow errors; 6xxxx agent errors.
              enum:
                - 10000
                - 10001
                - 10002
                - 10003
                - 10004
                - 10005
                - 10006
                - 10007
                - 10008
                - 10009
                - 10030
                - 10050
                - 10060
                - 20040
                - 20041
                - 20042
                - 20043
                - 20044
                - 20045
                - 30010
                - 30011
                - 30012
                - 30013
                - 30014
                - 30015
                - 30016
                - 30017
                - 30018
            message: {type: string}
            reason_code:
              type: string
              enum:
                - permission_missing
                - menu_denied
                - button_denied
                - data_scope_denied
                - approval_required
            field_errors:
              type: array
              items:
                type: object
                properties:
                  tab: {type: string}
                  field: {type: string}
                  code: {type: string}
                  message: {type: string}
            row_errors:
              type: array
              items:
                type: object
                properties:
                  row_number: {type: integer}
                  field_errors:
                    type: array
                    items:
                      type: object
                      properties:
                        tab: {type: string}
                        field: {type: string}
                        code: {type: string}
                        message: {type: string}
            trace_id: {type: string}
