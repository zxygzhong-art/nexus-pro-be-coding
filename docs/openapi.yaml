components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token issued by the configured identity provider and mapped to a local tenant account.
  parameters:
    ID:
      name: id
      in: path
      required: true
      description: Globally unique persisted resource identifier; tenant_id still scopes ownership and authorization.
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Sort:
      name: sort
      in: query
      schema:
        type: string
    EmployeeID:
      name: id
      in: path
      required: true
      description: Globally unique employee identifier; tenant_id still scopes ownership and authorization.
      schema:
        type: string
    AccountID:
      name: accountId
      in: path
      required: true
      description: Account identifier to add to or remove from a user group.
      schema:
        type: string
  responses:
    ValidationError:
      description: Validation failed. Field errors include tab, field, code and message; import row errors include row_number.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthenticated:
      description: Authenticated tenant/account context is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Permission, menu, button, field, or data-scope access was denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource was not found in the current tenant.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Required external service or credential integration is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error. Response includes trace_id.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    DataResponse:
      type: object
      required: [data]
      properties:
        data:
          description: Successful response payload.
    AgentExternalTool:
      type: object
      required: [id, tenant_id, name, description, kind, transport, endpoint_url, auth_type, credential_set, created_at]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        name: {type: string, maxLength: 120}
        description: {type: string, maxLength: 500}
        kind: {type: string, enum: [mcp, http]}
        transport: {type: string, enum: [sse, streamable_http, http]}
        endpoint_url: {type: string, format: uri}
        auth_type: {type: string, enum: [none, bearer, api_key, basic]}
        auth_header_name: {type: string, maxLength: 100}
        auth_username: {type: string, maxLength: 200}
        credential_set: {type: boolean}
        created_by_account_id: {type: string}
        created_at: {type: string, format: date-time}
    CreateAgentExternalToolRequest:
      type: object
      required: [name, kind, endpoint_url]
      properties:
        name: {type: string, maxLength: 120}
        description: {type: string, maxLength: 500}
        kind: {type: string, enum: [mcp, http]}
        transport:
          type: string
          enum: [sse, streamable_http, http]
          description: MCP accepts sse or streamable_http; HTTP APIs use http. Defaults from kind for backward compatibility.
        endpoint_url: {type: string, format: uri}
        auth_type: {type: string, enum: [none, bearer, api_key, basic], default: none}
        auth_header_name:
          type: string
          maxLength: 100
          description: Header name for api_key authentication; defaults to X-API-Key.
        auth_username: {type: string, maxLength: 200, description: Username for basic authentication.}
        auth_secret:
          type: string
          format: password
          writeOnly: true
          maxLength: 8192
          description: Required for bearer, api_key, and basic authentication; encrypted before persistence and never returned.
    AgentExternalToolListResponse:
      type: object
      required: [items, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/AgentExternalTool"}}
        total: {type: integer, minimum: 0}
    AgentExternalToolDataResponse:
      type: object
      required: [data]
      properties:
        data: {$ref: "#/components/schemas/AgentExternalTool"}
    AgentExternalToolListDataResponse:
      type: object
      required: [data]
      properties:
        data: {$ref: "#/components/schemas/AgentExternalToolListResponse"}
    KnowledgeBase:
      type: object
      required: [id, tenant_id, name, description, chunk_mode, chunk_size, chunk_overlap, document_count, created_at, updated_at]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        name: {type: string}
        description: {type: string}
        chunk_mode: {type: string, enum: [auto, paragraph, fixed]}
        chunk_size: {type: integer, minimum: 200, maximum: 4000}
        chunk_overlap: {type: integer, minimum: 0, description: Must be smaller than chunk_size.}
        document_count: {type: integer, minimum: 0}
        created_by_account_id: {type: string}
        updated_by_account_id: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    KnowledgeBaseListResponse:
      type: object
      required: [items, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/KnowledgeBase"}}
        total: {type: integer, minimum: 0}
    CreateKnowledgeBaseRequest:
      type: object
      required: [name]
      properties:
        name: {type: string}
        description: {type: string}
        chunk_mode: {type: string, enum: [auto, paragraph, fixed], default: auto}
        chunk_size: {type: integer, minimum: 200, maximum: 4000, default: 1200}
        chunk_overlap: {type: integer, minimum: 0, default: 200, description: Must be smaller than chunk_size.}
    UpdateKnowledgeBaseRequest:
      type: object
      properties:
        name: {type: string}
        description: {type: string}
        chunk_mode: {type: string, enum: [auto, paragraph, fixed]}
        chunk_size: {type: integer, minimum: 200, maximum: 4000}
        chunk_overlap: {type: integer, minimum: 0, description: Must be smaller than chunk_size. Changing chunk settings rebuilds all existing embeddings atomically.}
    KnowledgeDocument:
      type: object
      required: [id, tenant_id, knowledge_base_id, title, content, source_type, original_filename, content_type, size_bytes, sha256, object_provider, object_bucket, parse_status, parse_error, created_at, updated_at]
      properties:
        id: {type: string}
        tenant_id: {type: string}
        knowledge_base_id: {type: string}
        title: {type: string}
        content: {type: string, maxLength: 1000000, description: Extracted indexable text.}
        source_type: {type: string, enum: [manual, text, pdf]}
        original_filename: {type: string}
        content_type: {type: string}
        size_bytes: {type: integer, format: int64, minimum: 0}
        sha256: {type: string}
        object_provider: {type: string}
        object_bucket: {type: string}
        parse_status: {type: string, enum: [ready, failed]}
        parse_error: {type: string}
        created_by_account_id: {type: string}
        updated_by_account_id: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    KnowledgeDocumentListResponse:
      type: object
      required: [items, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/KnowledgeDocument"}}
        total: {type: integer, minimum: 0}
    CreateKnowledgeDocumentRequest:
      type: object
      required: [title, content]
      properties:
        title: {type: string}
        content: {type: string, maxLength: 200000}
    UpdateKnowledgeDocumentRequest:
      type: object
      properties:
        title: {type: string}
        content: {type: string, maxLength: 200000}
    KnowledgeSearchRequest:
      type: object
      required: [query]
      properties:
        query: {type: string}
        limit: {type: integer, minimum: 1, maximum: 50, default: 10}
    KnowledgeSearchHit:
      type: object
      required: [knowledge_base_id, knowledge_base_name, document_id, title, snippet, source, score]
      properties:
        knowledge_base_id: {type: string}
        knowledge_base_name: {type: string}
        document_id: {type: string}
        title: {type: string}
        snippet: {type: string}
        source: {type: string, example: "knowledge://kb_123/kdoc_456#chunk=1"}
        score: {type: number, format: double, minimum: -1, maximum: 1, description: Cosine similarity returned by pgvector.}
    KnowledgeSearchResponse:
      type: object
      required: [items, total, query, semantics]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/KnowledgeSearchHit"}}
        total: {type: integer, minimum: 0}
        query: {type: string}
        semantics: {type: string}
    AgentTeamMember:
      type: object
      required: [id, name, role, model_id, tools, knowledge_base_ids]
      properties:
        id: {type: string}
        name: {type: string}
        role: {type: string}
        model_id: {type: string}
        tools: {type: array, items: {type: string}}
        knowledge_base_ids: {type: array, items: {type: string}}
    LocalizedAgentSuggestedQuestion:
      type: object
      additionalProperties: false
      required: [translations]
      properties:
        translations:
          type: object
          additionalProperties: false
          minProperties: 1
          maxProperties: 2
          properties:
            zh-TW: {type: string, maxLength: 100}
            en-US: {type: string, maxLength: 100}
    AgentAccountUsage:
      type: object
      required: [account_id, display_name, status, session_count, message_count, llm_call_count, input_tokens, cached_tokens, output_tokens, total_tokens, actual_tokens]
      properties:
        account_id: {type: string}
        display_name: {type: string}
        email: {type: string}
        status: {type: string, enum: [active, disabled, pending_invite]}
        session_count: {type: integer, format: int64, minimum: 0}
        message_count: {type: integer, format: int64, minimum: 0}
        llm_call_count: {type: integer, format: int64, minimum: 0}
        input_tokens: {type: integer, format: int64, minimum: 0}
        cached_tokens: {type: integer, format: int64, minimum: 0, description: Cached prompt tokens reported by LiteLLM}
        output_tokens: {type: integer, format: int64, minimum: 0}
        total_tokens: {type: integer, format: int64, minimum: 0}
        actual_tokens: {type: integer, format: int64, minimum: 0, description: Total tokens minus cached prompt tokens}
        last_active_at: {type: string, format: date-time}
    AgentSessionUsage:
      type: object
      required: [session_id, account_id, title, status, message_count, llm_call_count, input_tokens, cached_tokens, output_tokens, total_tokens, actual_tokens]
      properties:
        session_id: {type: string}
        account_id: {type: string}
        title: {type: string}
        status: {type: string, enum: [active, archived]}
        message_count: {type: integer, format: int64, minimum: 0}
        llm_call_count: {type: integer, format: int64, minimum: 0}
        input_tokens: {type: integer, format: int64, minimum: 0}
