openapi: 3.0.3
info:
  title: Nexus Pro Backend API
  version: 0.2.0
  description: |
    Identifiers for persisted tenant resources are globally unique across tenants.
    tenant_id scopes ownership, authorization, and row-level security.
security:
  - bearerAuth: []
paths:
  /v1/auth/sso/google/verify:
    post:
      summary: Verify Google SSO login and bind the local Nexus account
      description: Public callback helper. The request must include a Keycloak Google SSO bearer token; the token email must be verified and match an existing active Nexus account.
      security: []
      responses:
        "200":
          description: Verified local login binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOLoginVerificationDataResponse"
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/home:
    get:
      summary: Get OA workbench home aggregates
      responses:
        "200":
          description: Home assistants, forms, and clock summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformHomeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/assistants:
    get:
      summary: List OA assistant cards
      parameters:
        - {name: tag, in: query, schema: {type: string, enum: [all, workflow, doc, analytics, it]}}
        - {name: search, in: query, schema: {type: string}}
      responses:
        "200":
          description: Assistant cards and quick prompts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAssistantsDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/forms:
    get:
      summary: Get employee self-service form catalog and applications
      responses:
        "200":
          description: Form catalog and current-account applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformFormsDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/tasks:
    get:
      summary: Get current-account task dashboard projection
      responses:
        "200":
          description: Task records, todos, clock summary, and AI panel prompts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTasksDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/tasks/items:
    post:
      summary: Create one current-account task work-log item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlatformTaskItemRequest"
      responses:
        "201":
          description: Created task item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTaskItemDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/tasks/items/{id}:
    patch:
      summary: Update one current-account task work-log item
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlatformTaskItemRequest"
      responses:
        "200":
          description: Updated task item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTaskItemDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalError"}
    delete:
      summary: Delete one current-account task work-log item
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted task item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTaskItemDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/tasks/todos:
    post:
      summary: Create one current-account task todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlatformTaskTodoRequest"
      responses:
        "201":
          description: Created task todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTaskTodoDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/tasks/todos/{id}:
    patch:
      summary: Update one current-account task todo
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlatformTaskTodoRequest"
      responses:
        "200":
          description: Updated task todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTaskTodoDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalError"}
    delete:
      summary: Delete one current-account task todo
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deleted task todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTaskTodoDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/platform/tasks/todos/{id}/convert:
    post:
      summary: Convert one current-account todo into a task work-log item
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertPlatformTaskTodoRequest"
      responses:
        "200":
          description: Created task item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTaskItemDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/notifications:
    get:
      summary: List current-account system notifications
      parameters:
        - {name: tone, in: query, schema: {type: string, enum: [success, info, warning]}}
        - {name: unread_only, in: query, schema: {type: boolean}}
        - {name: cursor, in: query, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 50}}
      responses:
        "200":
          description: Current-account notifications and unread metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/notifications/unread-count:
    get:
      summary: Get current-account unread notification count
      responses:
        "200":
          description: Unread notification count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationUnreadCountDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/notifications/{id}/read:
    post:
      summary: Mark one current-account notification as read
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Read marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationReadDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/notifications/read-all:
    post:
      summary: Mark all current-account notifications as read
      responses:
        "200":
          description: Bulk read marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationReadAllDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/positions:
    get:
      summary: List positions
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Position page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionListDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    post:
      summary: Create position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionInput"
      responses:
        "201":
          description: Created position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/positions/{id}:
    get:
      summary: Get position
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Position detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    patch:
      summary: Patch position
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionPatch"
      responses:
        "200":
          description: Updated position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    delete:
      summary: Disable position
      parameters:
        - $ref: "#/components/parameters/ApprovalConfirmed"
        - $ref: "#/components/parameters/ApprovalInstanceID"
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Disabled position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees:
    get:
      summary: List employees
      parameters:
        - {name: keyword, in: query, schema: {type: string}}
        - {name: department_id, in: query, schema: {type: string}}
        - {name: employment_status, in: query, schema: {type: string}}
        - {name: category, in: query, schema: {type: string}}
        - {name: page, in: query, schema: {type: integer, minimum: 1}}
        - {name: page_size, in: query, schema: {type: integer, minimum: 1, maximum: 100}}
        - {name: sort, in: query, schema: {type: string, enum: [created_at_asc, created_at_desc, hire_date_asc, hire_date_desc]}}
      responses:
        "200":
          description: Employee page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    post:
      summary: Create employee aggregate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetailDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/preview:
    post:
      summary: Validate and normalize employee create payload without persistence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "200":
          description: Employee preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeePreviewDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}:
    get:
      summary: Get employee detail grouped by profile sections
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      responses:
        "200":
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetailDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    patch:
      summary: Patch employee aggregate sections
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeePatch"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetailDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    delete:
      summary: Soft delete an employee
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      responses:
        "200":
          description: Soft-deleted employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}/preview:
    post:
      summary: Validate and preview employee patch without persistence
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeePatch"
      responses:
        "200":
          description: Employee update preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeePreviewDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/{id}/avatar:
    post:
      summary: Upload or replace employee avatar
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: {type: string, format: binary}
      responses:
        "200":
          description: Employee with updated avatar metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
    delete:
      summary: Remove employee avatar
      parameters:
        - $ref: "#/components/parameters/EmployeeID"
      responses:
        "200":
          description: Employee with avatar metadata removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/stats:
    get:
      summary: Employee dashboard counts
      parameters:
        - {name: keyword, in: query, schema: {type: string}}
        - {name: department_id, in: query, schema: {type: string}}
        - {name: employment_status, in: query, schema: {type: string}}
        - {name: category, in: query, schema: {type: string}}
      responses:
        "200":
          description: Employee statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeStatsDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employee-options:
    get:
      summary: Employee form options
      responses:
        "200":
          description: Employee options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeOptionsDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/import/template:
    get:
      summary: Download employee import template
      parameters:
        - {name: format, in: query, schema: {type: string, enum: [csv, xlsx], default: csv}}
      responses:
        "200":
          description: CSV or XLSX template with 10 import columns
          content:
            text/csv:
              schema:
                type: string
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/import/preview:
    post:
      summary: Preview employee CSV or XLSX import
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeImportPreviewRequest"
      responses:
        "201":
          description: Import preview session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeImportSessionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/import/{id}/confirm:
    post:
      summary: Confirm a previewed employee import
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeImportConfirmRequest"
      responses:
        "200":
          description: Confirmed import session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeImportSessionDataResponse"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "500": {$ref: "#/components/responses/InternalError"}
  /v1/hr/employees/ehrms/sync:
    post:
