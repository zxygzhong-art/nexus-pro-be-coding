        id: {type: string}
        icon: {type: string}
        name: {type: string}
        category: {type: string}
        desc: {type: string}
        flow: {type: string}
        enabled: {type: boolean}
        added_this_month: {type: boolean}
        updated_at: {type: string}
        fields:
