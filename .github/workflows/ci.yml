name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "codex/**"

permissions:
  contents: read

jobs:
  unit:
    name: Unit And Generated Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --timeout=5m

      - name: Unit tests
        run: GOCACHE=$PWD/.gocache go test ./tests/unit/...

      - name: Compile internal packages
        run: GOCACHE=$PWD/.gocache go test ./internal/...

      - name: Validate API smoke coverage
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python3 -m unittest discover -s tests/unit/tools/api-smoke -p 'test_*.py'
          python3 tools/api-smoke/full_api_smoke.py --check-coverage

      - name: Validate migrations
        run: make migrate-validate

      - name: Regenerate sqlc
        run: make sqlc

      - name: Check generated files
        run: git diff --exit-code

  postgres:
    name: Postgres Repository Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg17-bookworm
        env:
          POSTGRES_DB: nexus_pro_be
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_pro_be"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nexus
          DB_PASSWORD: nexus
          DB_NAME: nexus_pro_be
          DB_SSLMODE: disable
        run: |
          DATABASE_URL="postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}"
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.2 -dir db/migrations postgres "$DATABASE_URL" up

      - name: Create non-superuser RLS test role
        env:
          PGPASSWORD: nexus
        run: |
          psql "host=localhost port=5432 user=nexus dbname=nexus_pro_be sslmode=disable" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE nexus_rls LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'nexus_rls';
          GRANT USAGE ON SCHEMA public TO nexus_rls;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO nexus_rls;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO nexus_rls;
          ALTER DEFAULT PRIVILEGES FOR ROLE nexus IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO nexus_rls;
          ALTER DEFAULT PRIVILEGES FOR ROLE nexus IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO nexus_rls;
          SQL

      - name: Repository tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nexus_rls
          DB_PASSWORD: nexus_rls
          DB_NAME: nexus_pro_be
          DB_SSLMODE: disable
        run: GOCACHE=$PWD/.gocache go test ./tests/unit/repository/postgres

  integration:
    name: Postgres Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg17-bookworm
        env:
          POSTGRES_DB: nexus_pro_be
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_pro_be"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nexus
          DB_PASSWORD: nexus
          DB_NAME: nexus_pro_be
          DB_SSLMODE: disable
        run: |
          DATABASE_URL="postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}"
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.2 -dir db/migrations postgres "$DATABASE_URL" up

      - name: Create non-superuser RLS test role
        env:
          PGPASSWORD: nexus
        run: |
          psql "host=localhost port=5432 user=nexus dbname=nexus_pro_be sslmode=disable" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE nexus_rls LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'nexus_rls';
          GRANT USAGE ON SCHEMA public TO nexus_rls;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO nexus_rls;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO nexus_rls;
          ALTER DEFAULT PRIVILEGES FOR ROLE nexus IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO nexus_rls;
          ALTER DEFAULT PRIVILEGES FOR ROLE nexus IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO nexus_rls;
          SQL

      - name: Integration tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nexus
          DB_PASSWORD: nexus
          DB_NAME: nexus_pro_be
          DB_SSLMODE: disable
          DB_RLS_USERNAME: nexus_rls
          DB_RLS_PASSWORD: nexus_rls
        run: GOCACHE=$PWD/.gocache go test ./tests/integration/postgres
