services:
  # 可選的容器化 API；需要時用下列命令明確啟動：
  #   執行：docker compose --profile api up -d api
  # 環境變數來自 .env；在 compose network 內，API 必須用 service name
  # 連到依賴（postgres:5432、redis:6379），不能使用 localhost。
  api:
    build: .
    profiles:
      - api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_pro_be
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_pro_be"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.7
    ports:
      - "27233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: nexus
      POSTGRES_PWD: nexus
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      DEFAULT_NAMESPACE: default
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./ops/generated/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.51.1
    ports:
      - "24088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3002,http://localhost:24088
    depends_on:
      - temporal

  temporal-admin-tools:
    image: temporalio/admin-tools:1.29.7-tctl-1.18.4-cli-1.7.2
    entrypoint:
      - tail
      - -f
      - /dev/null
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    depends_on:
      - temporal

  nats:
    image: nats:2.14.3
    command:
      - "--name=nexus-pro-nats"
      - "--jetstream"
      - "--store_dir=/data/jetstream"
      - "--http_port=8222"
    ports:
      - "24222:4222"
      - "28222:8222"
    volumes:
      - nats-data:/data

  tempo:
    image: grafana/tempo:latest
    command: -config.file=/etc/tempo/local-config.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./ops/tempo/local-config.yaml:/etc/tempo/local-config.yaml:ro
      - tempo-data:/tmp/tempo

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo

volumes:
  postgres-data:
  nats-data:
  tempo-data:
  grafana-data:
