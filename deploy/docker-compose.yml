# Local development stack. `make db-up` brings up just postgres + redis; the full
# stack (openfga, keycloak, migrate, api) comes up with `make compose-up`.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # One-shot: apply migrations (creates schema, RLS, app_user, seed) as owner.
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    entrypoint: ["/app/migrate", "up"]
    environment:
      MIGRATE_DSN: postgres://nexus:nexus@postgres:5432/nexus?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      API_ADDR: ":8088"
      DB_DSN: postgres://app_user:app_pass@postgres:5432/nexus?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      AUTHZ_BACKEND: local
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # OpenFGA (future ReBAC backend). Model lives at deploy/openfga/model.fga.
  openfga:
    image: openfga/openfga:latest
    command: run
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Keycloak (future OIDC). Dev mode; import a realm from deploy/keycloak.
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: ["start-dev", "--http-port=8081"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8081"

volumes:
  pgdata:
